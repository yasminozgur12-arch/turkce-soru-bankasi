<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. Sınıf Türkçe Soru Bankası | Maarif Modeli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8E7;
    --ink: #1F2937;
    --ink-soft: #4B5563;
    --paper: #FFFFFF;
    --primary: #FF6B6B;
    --primary-dark: #E63946;
    --secondary: #4ECDC4;
    --accent: #FFD93D;
    --purple: #A78BFA;
    --green: #6BCB77;
    --easy: #6BCB77;
    --medium: #FFA94D;
    --hard: #FF6B6B;
    --shadow: rgba(31, 41, 55, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    background-image: 
      radial-gradient(circle at 20% 10%, rgba(255, 217, 61, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.12) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(167, 139, 250, 0.08) 0%, transparent 50%);
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    position: relative;
  }

  .badge {
    display: inline-block;
    background: var(--ink);
    color: var(--accent);
    padding: 0.4rem 1rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  h1 .accent {
    font-style: italic;
    font-weight: 500;
    color: var(--primary);
  }

  .subtitle {
    color: var(--ink-soft);
    font-size: 1rem;
    max-width: 500px;
    margin: 0 auto;
  }

  .doodle {
    position: absolute;
    font-size: 2.5rem;
    opacity: 0.4;
    pointer-events: none;
    animation: float 4s ease-in-out infinite;
  }
  .doodle.d1 { top: 1rem; left: 5%; animation-delay: 0s; }
  .doodle.d2 { top: 3rem; right: 8%; animation-delay: 1s; }
  .doodle.d3 { top: 8rem; left: 12%; animation-delay: 2s; font-size: 2rem; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }

  /* CONTAINER */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 1rem;
  }

  /* PROGRESS */
  .progress-card {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 20px;
    padding: 1rem 1.25rem;
    margin: 1.5rem auto;
    max-width: 800px;
    box-shadow: 5px 5px 0 var(--ink);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .progress-stat {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 600;
    font-size: 0.9rem;
  }
  .progress-stat .num {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--primary);
  }
  .progress-stat.green .num { color: var(--green); }
  .progress-stat.yellow .num { color: var(--medium); }

  .reset-btn {
    margin-left: auto;
    background: transparent;
    border: 2px solid var(--ink);
    padding: 0.4rem 0.8rem;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: var(--ink); color: var(--accent); }

  /* KAZANIM GRID */
  .kazanim-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    margin: 2rem 0;
  }

  .kazanim-card {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 20px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 5px 5px 0 var(--ink);
    position: relative;
    overflow: hidden;
  }

  .kazanim-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 var(--ink);
  }

  .kazanim-card.completed {
    background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
  }

  .kazanim-card.completed::after {
    content: '✓';
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    width: 28px;
    height: 28px;
    background: var(--green);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1rem;
  }

  .kazanim-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--paper);
    background: var(--ink);
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    margin-bottom: 0.5rem;
  }
  .kazanim-card[data-area="okuma"] .kazanim-tag { background: var(--primary); }
  .kazanim-card[data-area="dinleme"] .kazanim-tag { background: var(--purple); }
  .kazanim-card[data-area="konusma"] .kazanim-tag { background: var(--secondary); }
  .kazanim-card[data-area="yazma"] .kazanim-tag { background: var(--medium); }

  .kazanim-code {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 1.1rem;
    margin-bottom: 0.3rem;
  }

  .kazanim-title {
    font-size: 0.9rem;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(31, 41, 55, 0.6);
    backdrop-filter: blur(8px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
    overflow-y: auto;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg);
    max-width: 700px;
    width: 100%;
    border: 3px solid var(--ink);
    border-radius: 24px;
    padding: 1.75rem;
    margin: 2rem 0;
    box-shadow: 8px 8px 0 var(--ink);
    position: relative;
  }

  .close-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    background: var(--paper);
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: 700;
    transition: all 0.2s;
  }
  .close-btn:hover { background: var(--primary); color: white; }

  .modal-header {
    border-bottom: 2px dashed var(--ink-soft);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
  }

  .modal-code {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 800;
  }

  .modal-title {
    color: var(--ink-soft);
    font-size: 0.95rem;
    margin-top: 0.25rem;
  }

  /* QUESTION CARD */
  .question {
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .difficulty-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    color: white;
    margin-bottom: 0.75rem;
  }
  .difficulty-tag.easy { background: var(--easy); }
  .difficulty-tag.medium { background: var(--medium); }
  .difficulty-tag.hard { background: var(--hard); }

  .question-text {
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 1rem;
    white-space: pre-line;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .option {
    background: #FAFAFA;
    border: 2px solid #E5E7EB;
    border-radius: 10px;
    padding: 0.6rem 0.9rem;
    font-size: 0.95rem;
    transition: all 0.15s;
  }

  .actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }

  .btn {
    font-family: inherit;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    border: 2px solid var(--ink);
    background: var(--paper);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn.hint { background: var(--accent); }
  .btn.answer { background: var(--secondary); color: var(--ink); }
  .btn.done { background: var(--green); color: white; }
  .btn.done.active { background: var(--ink); color: var(--accent); }

  .reveal {
    margin-top: 0.75rem;
    padding: 0.85rem 1rem;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.55;
    display: none;
    animation: slideDown 0.3s ease;
  }
  .reveal.show { display: block; }
  .reveal.hint-box { background: #FFF3CD; border: 2px solid var(--accent); }
  .reveal.answer-box { background: #D1ECF1; border: 2px solid var(--secondary); }
  .reveal strong { font-weight: 700; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin: 1.5rem 0;
  }
  .filter-btn {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 0.5rem 1rem;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--ink);
    color: var(--accent);
  }

  footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--ink-soft);
    font-size: 0.85rem;
  }
  footer strong { font-family: 'Fraunces', serif; color: var(--primary); }

  @media (max-width: 600px) {
    .modal { padding: 1.25rem; }
    .progress-card { font-size: 0.8rem; }
    .progress-stat .num { font-size: 1.2rem; }
    .doodle { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="doodle d1">📚</div>
  <div class="doodle d2">✏️</div>
  <div class="doodle d3">🎈</div>
  <span class="badge">Türkiye Yüzyılı Maarif Modeli</span>
  <h1>5. Sınıf Türkçe<br><span class="accent">Soru Bankası</span></h1>
  <p class="subtitle">Öğrenme çıktısı seç, sorulara çöz, eğlenerek öğren! 🚀</p>
</header>

<div class="container">

  <div class="progress-card">
    <div class="progress-stat">
      <span class="num" id="totalCount">0</span>
      <span>Toplam Çıktı</span>
    </div>
    <div class="progress-stat green">
      <span class="num" id="doneCount">0</span>
      <span>Tamamlanan</span>
    </div>
    <div class="progress-stat yellow">
      <span class="num" id="percentCount">0%</span>
      <span>İlerleme</span>
    </div>
    <button class="reset-btn" onclick="resetProgress()">↺ Sıfırla</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterArea('all', this)">Tümü</button>
    <button class="filter-btn" onclick="filterArea('okuma', this)">📖 Okuma</button>
    <button class="filter-btn" onclick="filterArea('dinleme', this)">👂 Dinleme</button>
    <button class="filter-btn" onclick="filterArea('konusma', this)">💬 Konuşma</button>
    <button class="filter-btn" onclick="filterArea('yazma', this)">✍️ Yazma</button>
  </div>

  <div class="kazanim-grid" id="kazanimGrid"></div>
</div>

<footer>
  <p>Hazırlayan: <strong>@jasmin.eduflow</strong> · Müfredat: 2025-2026 MEB Maarif Modeli</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ============= SORU BANKASI =============
const KAZANIMLAR = [
  // ============ OKUMA ============
  {
    code: "T.O.5.5",
    area: "okuma",
    areaLabel: "OKUMA",
    title: "Anlamını bilmediği kelimelerin anlamını tahmin edebilme",
    questions: [
      {
        difficulty: "easy",
        text: "Aşağıdaki cümlede altı çizili kelimenin anlamı nedir?\n\n«Bahçedeki kuru yapraklar rüzgârla SAVRULDU.»\n\nA) Tek tek düştü\nB) Hızla dağıldı\nC) Toplandı\nD) Yere yapıştı",
        hint: "Rüzgâr kuvvetli estiğinde yapraklar nasıl hareket eder? Cümlede 'rüzgârla' kelimesi ipucu veriyor.",
        answer: "✅ Doğru cevap: B) Hızla dağıldı\n\n«Savrulmak», bir şeyin rüzgâr veya başka bir kuvvetle hızlıca her yöne dağılması demektir. Cümledeki «rüzgârla» ifadesi bize ipucu verir."
      },
      {
        difficulty: "medium",
        text: "«Annem bugün çok NEŞELİ görünüyor.» cümlesindeki «neşeli» kelimesinin anlamı aşağıdakilerden hangisinde aynıdır?\n\nA) Üzgün bir çocuk parkta oturuyordu.\nB) Mutlu bir öğrenci sınıfa girdi.\nC) Yorgun bir işçi eve döndü.\nD) Hasta bir kuş kafeste duruyor.",
        hint: "«Neşeli» kelimesi sevinçli, hoş bir hâli anlatır. Hangi seçenekte buna en yakın bir kelime var?",
        answer: "✅ Doğru cevap: B) Mutlu bir öğrenci sınıfa girdi.\n\n«Neşeli» = «mutlu, sevinçli» anlamına gelir. İkisi de aynı duyguyu anlatan kelimelerdir. Buna eş anlamlı kelimeler diyoruz."
      },
      {
        difficulty: "hard",
        text: "Aşağıdaki paragrafı oku ve «MÜTHİŞ» kelimesinin anlamını tahmin et:\n\n«Maçın son dakikasında kalecimiz MÜTHİŞ bir kurtarış yaptı. Topu havada yakaladı, herkes ayağa kalktı, tribünler alkıştan yıkıldı.»\n\nKısaca açıkla: Bu cümlede «müthiş» ne anlama geliyor? Hangi ipuçlarından anladın?",
        hint: "Cümlenin devamına bak: insanlar nasıl tepki verdi? Bu tepki sıradan bir şey için olur mu?",
        answer: "✅ Beklenen cevap:\n«Müthiş» burada «çok başarılı, harika, olağanüstü» anlamına gelir.\n\nİpuçları:\n• «Herkes ayağa kalktı»\n• «Tribünler alkıştan yıkıldı»\n• «Topu havada yakaladı»\n\nBu tepkiler ancak çok iyi bir şey karşısında verilir. Yani «müthiş» olumlu ve güçlü bir kelimedir.\n\n💡 Günlük hayatta: Annenin yaptığı pasta için «müthiş olmuş!» dediğinde de aynı anlamda kullanırsın."
      }
    ]
  },
  {
    code: "T.O.5.6",
    area: "okuma",
    areaLabel: "OKUMA",
    title: "Metnin yüzey anlamını belirleyebilme",
    questions: [
      {
        difficulty: "easy",
        text: "Metni oku:\n\n«Ali sabah erken kalktı. Kahvaltısını yaptı, çantasını hazırladı ve okula gitti. Sınıfta arkadaşı Mehmet'le buluştu. İlk dersleri matematikti.»\n\nAli okula gitmeden önce ne yaptı?\n\nA) Mehmet ile buluştu\nB) Matematik dersi gördü\nC) Kahvaltı yaptı ve çantasını hazırladı\nD) Erken yattı",
        hint: "Soru «okula gitmeden önce» diyor. Sıralamaya dikkat et!",
        answer: "✅ Doğru cevap: C) Kahvaltı yaptı ve çantasını hazırladı\n\nMetinde sıralama açık: «kahvaltısını yaptı → çantasını hazırladı → okula gitti». Mehmet ile buluşmak ve matematik dersi okula gittikten sonra olan şeyler."
      },
      {
        difficulty: "medium",
        text: "Aşağıdaki metni oku ve sorulara cevap ver:\n\n«Köpekler insanın en sadık dostudur. Sahibini tanır, ona zarar verenleri uzaklaştırmaya çalışır. Eski Mısır'da köpekler kutsal sayılırdı. Bugün hâlâ köpekler polise, çobanlara ve görme engellilere yardım ediyor.»\n\n1. Köpekler eski Mısır'da nasıl görülürdü?\n2. Köpekler bugün hangi üç gruba yardım ediyor?",
        hint: "Cevaplar metnin içinde aynen yazıyor. Dikkatlice tara!",
        answer: "✅ Cevaplar:\n\n1. Köpekler eski Mısır'da KUTSAL sayılırdı.\n\n2. Köpekler bugün:\n   • Polise\n   • Çobanlara\n   • Görme engellilere\nyardım ediyor.\n\nBunlara «yüzey anlamlı bilgi» denir, çünkü metinde doğrudan yazılıdır."
      },
      {
        difficulty: "hard",
        text: "Metni oku:\n\n«Ahmet okul kantinine girdi. Cebindeki 20 lirayı saydı. Önce bir simit aldı (5 lira), sonra arkadaşı Burak'a ayran ısmarladı (8 lira). Çıkarken bir defter görüp aldı. Geri 2 lira kaldı.»\n\nAhmet kantinde TOPLAM kaç lira harcadı? Defter kaç liraydı? Cevabını işlemle göster.",
        hint: "Önce başta kaç lirası vardı? Sonunda kaç lirası kaldı? Aradaki fark toplam harcamayı verir. Sonra simit + ayran çıkarınca defter çıkar.",
        answer: "✅ Çözüm:\n\n• Başta: 20 lira\n• Sonda: 2 lira\n• TOPLAM HARCAMA = 20 - 2 = 18 lira\n\n• Simit: 5 lira\n• Ayran: 8 lira\n• Bilinenler toplamı: 5 + 8 = 13 lira\n\n• DEFTER = 18 - 13 = 5 lira\n\n💡 Günlük hayat bağlantısı: Markete gittiğinde aldığın şeylerin fiyatlarını toplayarak ne kadar harcadığını hesaplayabilirsin. Para yönetimi böyle başlar!"
      }
    ]
  },
  {
    code: "T.O.5.8",
    area: "okuma",
    areaLabel: "OKUMA",
    title: "Metnin derin anlamını belirlemeye yönelik basit çıkarımlar yapabilme",
    questions: [
      {
        difficulty: "easy",
        text: "Metni oku:\n\n«Defne sınıfa girdiğinde gözleri kızarmıştı. Çantasını sessizce sırasına bıraktı, kimse ile konuşmadı. Öğretmen 'iyi misin?' diye sordu, başını salladı ama yere bakıyordu.»\n\nDefne büyük ihtimalle nasıl hissediyor?\n\nA) Mutlu\nB) Üzgün\nC) Heyecanlı\nD) Sinirli",
        hint: "«Gözleri kızarmıştı», «sessizce», «yere bakıyordu» — bu ifadeler sana hangi duyguyu çağrıştırıyor?",
        answer: "✅ Doğru cevap: B) Üzgün\n\nMetinde Defne'nin üzgün olduğu DOĞRUDAN yazmıyor — ama ipuçları var:\n• Kızarık gözler (ağlamış olabilir)\n• Sessizlik\n• Yere bakmak\n\nBu ipuçlarından anlam çıkarmaya «çıkarım yapma» denir."
      },
      {
        difficulty: "medium",
        text: "Metni oku:\n\n«Pencereden dışarı baktım. Ağaçlar sallanıyor, insanlar şemsiyelerini açmaya çalışıyordu. Kediler hızla saçak altına kaçıştı. Karanlık bulutlar gökyüzünü kapladı.»\n\nMetinde HAVA DURUMU hakkında ne çıkarım yapabilirsin? Cevabını metindeki en az 2 ipucuyla destekle.",
        hint: "Yağmur, fırtına, rüzgâr... insanlar ve hayvanlar nasıl davranıyor?",
        answer: "✅ Beklenen cevap:\n\nHava muhtemelen FIRTINALI / YAĞMURLU / RÜZGÂRLI olacak.\n\nİpuçları (en az 2 tane yeterli):\n• Ağaçlar sallanıyor → kuvvetli rüzgâr\n• İnsanlar şemsiye açıyor → yağmur yaklaşıyor\n• Kediler saçağa kaçıyor → hayvanlar tehlike sezdi\n• Karanlık bulutlar → yağmur işareti\n\nMetin direkt 'fırtına olacak' demiyor ama tüm bu işaretler bizi bu sonuca götürüyor."
      },

// ============= APP =============
const grid = document.getElementById('kazanimGrid');
const overlay = document.getElementById('modalOverlay');
const modalContent = document.getElementById('modalContent');
let currentFilter = 'all';

function getCompleted() {
  try {
    return JSON.parse(localStorage.getItem('completed') || '[]');
  } catch { return []; }
}

function setCompleted(arr) {
  try { localStorage.setItem('completed', JSON.stringify(arr)); } catch {}
}

function toggleCompleted(code) {
  const c = getCompleted();
  const i = c.indexOf(code);
  if (i > -1) c.splice(i, 1); else c.push(code);
  setCompleted(c);
  renderGrid();
  renderProgress();
  // Modal güncelle
  if (document.getElementById('modal-done-btn')) {
    const btn = document.getElementById('modal-done-btn');
    btn.textContent = c.includes(code) ? '✓ Tamamlandı' : '○ Tamamla';
    btn.classList.toggle('active', c.includes(code));
  }
}

function renderProgress() {
  const total = KAZANIMLAR.length;
  const done = getCompleted().filter(c => KAZANIMLAR.some(k => k.code === c)).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('percentCount').textContent = pct + '%';
}

function resetProgress() {
  if (confirm('Tüm ilerlemeni sıfırlamak istediğine emin misin?')) {
    setCompleted([]);
    renderGrid();
    renderProgress();
  }
}

function filterArea(area, btn) {
  currentFilter = area;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const completed = getCompleted();
  const filtered = currentFilter === 'all'
    ? KAZANIMLAR
    : KAZANIMLAR.filter(k => k.area === currentFilter);

  grid.innerHTML = filtered.map(k => `
    <div class="kazanim-card ${completed.includes(k.code) ? 'completed' : ''}" 
         data-area="${k.area}" 
         onclick="openModal('${k.code}')">
      <span class="kazanim-tag">${k.areaLabel}</span>
      <div class="kazanim-code">${k.code}</div>
      <div class="kazanim-title">${k.title}</div>
    </div>
  `).join('');
}

function openModal(code) {
  const k = KAZANIMLAR.find(x => x.code === code);
  if (!k) return;
  const completed = getCompleted();
  const isDone = completed.includes(code);

  modalContent.innerHTML = `
    <button class="close-btn" onclick="closeModal()">×</button>
    <div class="modal-header">
      <span class="kazanim-tag" style="background: var(--ink); color: var(--accent);">${k.areaLabel}</span>
      <div class="modal-code">${k.code}</div>
      <div class="modal-title">${k.title}</div>
    </div>

    ${k.questions.map((q, i) => `
      <div class="question">
        <span class="difficulty-tag ${q.difficulty}">
          ${q.difficulty === 'easy' ? '🟢 KOLAY' : q.difficulty === 'medium' ? '🟡 ORTA' : '🔴 ZOR'}
        </span>
        <div class="question-text">${q.text}</div>
        <div class="actions">
          <button class="btn hint" onclick="toggleReveal('hint-${code}-${i}')">💡 İpucu</button>
          <button class="btn answer" onclick="toggleReveal('ans-${code}-${i}')">✓ Cevabı Gör</button>
        </div>
        <div class="reveal hint-box" id="hint-${code}-${i}">
          <strong>İPUCU:</strong><br>${q.hint}
        </div>
        <div class="reveal answer-box" id="ans-${code}-${i}">
          ${q.answer.replace(/\n/g, '<br>')}
        </div>
      </div>
    `).join('')}

    <div style="text-align: center; margin-top: 1rem;">
      <button class="btn done ${isDone ? 'active' : ''}" id="modal-done-btn" onclick="toggleCompleted('${code}')">
        ${isDone ? '✓ Tamamlandı' : '○ Tamamla'}
      </button>
    </div>
  `;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

function toggleReveal(id) {
  document.getElementById(id).classList.toggle('show');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
renderProgress();
renderGrid();
</script>

</body>
</html>
